<!DOCTYPE html>
<html>
<head>
  <title>3D Car Game</title>
  <style>
    body { margin: 0; overflow: hidden; }
    #error {
      position: fixed;
      top: 0;
      left: 0;
      color: red;
      background: white;
      font-family: monospace;
      padding: 10px;
      z-index: 9999;
    }
  </style>
</head>
<body>

<div id="error"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r152/three.min.js"></script>

<script>
try {

if (typeof THREE === "undefined") {
  throw new Error("Three.js failed to load (no internet or blocked).");
}

// Scene
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);

// Camera
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(0, 5, 10);

// Renderer
const renderer = new THREE.WebGLRenderer();
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// Light
const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(10, 20, 10);
scene.add(light);

// Ground
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(200, 200),
  new THREE.MeshLambertMaterial({ color: 0x3a9d23 })
);
ground.rotation.x = -Math.PI / 2;
scene.add(ground);

// Road
const road = new THREE.Mesh(
  new THREE.PlaneGeometry(10, 200),
  new THREE.MeshLambertMaterial({ color: 0x333333 })
);
road.rotation.x = -Math.PI / 2;
road.position.y = 0.01;
scene.add(road);

// Car
const car = new THREE.Mesh(
  new THREE.BoxGeometry(2, 1, 4),
  new THREE.MeshLambertMaterial({ color: 0xff0000 })
);
car.position.y = 0.5;
scene.add(car);

// Controls
const keys = {};
window.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
window.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

let speed = 0;
let angle = 0;

function animate() {
  requestAnimationFrame(animate);

  if (keys["w"]) speed += 0.01;
  if (keys["s"]) speed -= 0.01;
  speed *= 0.95;

  if (keys["a"]) angle += 0.03;
  if (keys["d"]) angle -= 0.03;

  car.rotation.y = angle;
  car.position.x += Math.sin(angle) * speed * 5;
  car.position.z += Math.cos(angle) * speed * 5;

  // camera follow
  camera.position.x = car.position.x - Math.sin(angle) * 8;
  camera.position.z = car.position.z - Math.cos(angle) * 8;
  camera.lookAt(car.position);

  renderer.render(scene, camera);
}

animate();

// Resize
window.addEventListener("resize", () => {
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

} catch (err) {
  document.getElementById("error").innerText = err.message;
  console.error(err);
}
</script>

</body>
</html>
