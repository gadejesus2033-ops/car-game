<!DOCTYPE html>
<html>
<head>
  <title>3D Car Game</title>
  <style>
    body { margin:0; overflow:hidden; }

    #map {
      position:fixed;
      top:10px;
      right:10px;
      width:200px;
      height:200px;
      background:black;
      border:2px solid white;
    }
  </style>
</head>
<body>

<canvas id="map"></canvas>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>

<script>
// ===== SCENE =====
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);

// ===== CAMERA =====
const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);

// ===== RENDERER =====
const renderer = new THREE.WebGLRenderer();
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// ===== LIGHT =====
const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(5,10,5);
scene.add(light);

// ===== GROUND =====
const ground = new THREE.Mesh(
  new THREE.BoxGeometry(200,1,200),
  new THREE.MeshLambertMaterial({color:0x339933})
);
ground.position.y = -3;
scene.add(ground);

// ===== ROAD =====
for(let z=0; z<80; z+=4){
  const road = new THREE.Mesh(
    new THREE.BoxGeometry(4,0.1,3),
    new THREE.MeshBasicMaterial({color:0x333333})
  );
  road.position.set(0,-2.5,z);
  scene.add(road);
}

// ===== BUILDINGS =====
const buildings = [];
for(let x=-6;x<=6;x++){
  for(let z=10;z<100;z+=10){
    if(Math.abs(x)>1){
      const b = new THREE.Mesh(
        new THREE.BoxGeometry(2,4,2),
        new THREE.MeshLambertMaterial({color:0x888888})
      );
      b.position.set(x*3,0,z);
      scene.add(b);
      buildings.push(b);
    }
  }
}

// ===== CAR =====
const car = new THREE.Mesh(
  new THREE.BoxGeometry(1,1,2),
  new THREE.MeshLambertMaterial({color:0xff0000})
);
car.position.y = -2;
scene.add(car);

// ===== CONTROLS =====
let speed = 0;
let angle = 0;
let camDistance = 8;

const keys = {};
addEventListener("keydown", e=>keys[e.key.toLowerCase()]=true);
addEventListener("keyup", e=>keys[e.key.toLowerCase()]=false);

// zoom
addEventListener("wheel", e=>{
  camDistance += e.deltaY * 0.01;
  camDistance = Math.max(4, Math.min(20, camDistance));
});

// ===== MINIMAP =====
const mapCanvas = document.getElementById("map");
const mapCtx = mapCanvas.getContext("2d");

function drawMap(){
  mapCtx.clearRect(0,0,200,200);

  const scale = 2;
  const offsetX = 100 - car.position.x * scale;
  const offsetY = 100 - car.position.z * scale;

  // road
  mapCtx.fillStyle = "gray";
  for(let z=0;z<80;z+=4){
    mapCtx.fillRect(offsetX-4, z*scale+offsetY-2, 8, 4);
  }

  // buildings
  mapCtx.fillStyle = "white";
  buildings.forEach(b=>{
    mapCtx.fillRect(
      b.position.x*scale+offsetX-3,
      b.position.z*scale+offsetY-3,
      6,6
    );
  });

  // car
  mapCtx.fillStyle = "red";
  mapCtx.beginPath();
  mapCtx.arc(100,100,4,0,Math.PI*2);
  mapCtx.fill();
}

// ===== LOOP =====
function animate(){

  // movement
  if(keys["w"]) speed += 0.02;
  if(keys["s"]) speed -= 0.02;
  speed *= 0.95;

  if(keys["a"]) angle += 0.03;
  if(keys["d"]) angle -= 0.03;

  car.position.x += Math.sin(angle) * speed * 2;
  car.position.z += Math.cos(angle) * speed * 2;
  car.rotation.y = -angle;

  // ✅ YOUR CAMERA (PERFECT)
  camera.position.x = car.position.x - Math.sin(angle) * camDistance;
  camera.position.z = car.position.z - Math.cos(angle) * camDistance;
  camera.position.y = 5;

  camera.lookAt(car.position);

  drawMap();

  renderer.render(scene, camera);
  requestAnimationFrame(animate);
}

animate();

// resize
addEventListener("resize", ()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>

</body>
</html>
