<!DOCTYPE html>
<html>
<head>
  <title>3D Car Game</title>
  <style>
    body { margin: 0; overflow: hidden; }
  </style>
</head>
<body>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r152/three.min.js"></script>

<script>
// Scene
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);

// Camera
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);

// Renderer
const renderer = new THREE.WebGLRenderer();
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// Light
const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(10,20,10);
scene.add(light);

// Ground
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(1000, 1000),
  new THREE.MeshLambertMaterial({ color: 0x228B22 })
);
ground.rotation.x = -Math.PI / 2;
scene.add(ground);

// ===== CAR =====
const car = new THREE.Group();

const body = new THREE.Mesh(
  new THREE.BoxGeometry(2, 0.5, 4),
  new THREE.MeshLambertMaterial({ color: 0xff0000 })
);
body.position.y = 0.5;
car.add(body);

function wheel(x, z) {
  const w = new THREE.Mesh(
    new THREE.CylinderGeometry(0.4, 0.4, 0.5, 16),
    new THREE.MeshLambertMaterial({ color: 0x333333 })
  );
  w.rotation.z = Math.PI / 2;
  w.position.set(x, 0.4, z);
  return w;
}

car.add(wheel(-1, 1.5));
car.add(wheel(1, 1.5));
car.add(wheel(-1, -1.5));
car.add(wheel(1, -1.5));

scene.add(car);

// Controls
const keys = {};
addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

let speed = 0;
let angle = 0;

// ===== RENDER ZONE SYSTEM =====
const TILE_SIZE = 20;
const RENDER_DIST = 6;
let tiles = {};

function createTile(tx, tz) {
  const key = tx + "," + tz;
  if (tiles[key]) return;

  const group = new THREE.Group();
  const worldX = tx * TILE_SIZE;
  const worldZ = tz * TILE_SIZE;

  // Road in center
  if (tx === 0) {
    const road = new THREE.Mesh(
      new THREE.PlaneGeometry(12, TILE_SIZE),
      new THREE.MeshLambertMaterial({ color: 0x333333 })
    );
    road.rotation.x = -Math.PI / 2;
    road.position.set(worldX, 0.01, worldZ);
    group.add(road);
  } else {
    // Buildings
    const h = Math.random() * 8 + 4;
    const building = new THREE.Mesh(
      new THREE.BoxGeometry(8, h, 8),
      new THREE.MeshLambertMaterial({ color: Math.random() * 0xffffff })
    );
    building.position.set(worldX, h/2, worldZ);
    group.add(building);
  }

  scene.add(group);
  tiles[key] = group;
}

function updateTiles() {
  const playerTX = Math.floor(car.position.x / TILE_SIZE);
  const playerTZ = Math.floor(car.position.z / TILE_SIZE);

  for (let x = -RENDER_DIST; x <= RENDER_DIST; x++) {
    for (let z = -RENDER_DIST; z <= RENDER_DIST; z++) {
      createTile(playerTX + x, playerTZ + z);
    }
  }

  for (let key in tiles) {
    const [tx, tz] = key.split(",").map(Number);

    if (
      Math.abs(tx - playerTX) > RENDER_DIST ||
      Math.abs(tz - playerTZ) > RENDER_DIST
    ) {
      scene.remove(tiles[key]);
      delete tiles[key];
    }
  }
}

// ===== GAME LOOP =====
function animate() {
  requestAnimationFrame(animate);

  if (keys["w"]) speed += 0.002;
  if (keys["s"]) speed -= 0.002;
  speed *= 0.98;

  if (keys["a"]) angle += 0.03;
  if (keys["d"]) angle -= 0.03;

  car.rotation.y = angle;
  car.position.x += Math.sin(angle) * speed * 100;
  car.position.z += Math.cos(angle) * speed * 100;

  updateTiles();

  camera.position.x = car.position.x - Math.sin(angle) * 10;
  camera.position.z = car.position.z - Math.cos(angle) * 10;
  camera.position.y = 6;
  camera.lookAt(car.position);

  renderer.render(scene, camera);
}

animate();

// Resize
addEventListener("resize", () => {
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>

</body>
</html>
