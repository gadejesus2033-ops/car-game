<!DOCTYPE html>
<html>
<head>
  <title>3D Car Game</title>
  <style>
    body { margin: 0; overflow: hidden; }
  </style>
</head>
<body>

<script>
// ===== MINI 3D ENGINE (instead of Three.js) =====
const canvas = document.createElement("canvas");
document.body.appendChild(canvas);
const ctx = canvas.getContext("2d");

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

// ===== GAME STATE =====
let car = { x: 0, z: 0, angle: 0, speed: 0 };
const keys = {};

document.addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
document.addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

// ===== SIMPLE 3D PROJECTION =====
function project(x, z) {
  const scale = 300 / (z + 50);
  return {
    x: canvas.width / 2 + x * scale,
    y: canvas.height / 2 + scale * 50
  };
}

// ===== BUILDINGS =====
let buildings = [];
for (let i = -100; i <= 100; i += 20) {
  for (let j = 20; j <= 200; j += 20) {
    if (Math.abs(i) > 10) {
      buildings.push({
        x: i,
        z: j,
        h: Math.random() * 20 + 10
      });
    }
  }
}

// ===== GAME LOOP =====
function update() {
  // movement
  if (keys["w"]) car.speed += 0.02;
  if (keys["s"]) car.speed -= 0.02;
  car.speed *= 0.95;

  if (keys["a"]) car.angle += 0.04;
  if (keys["d"]) car.angle -= 0.04;

  car.x += Math.sin(car.angle) * car.speed * 2;
  car.z += Math.cos(car.angle) * car.speed * 2;
}

function draw() {
  ctx.fillStyle = "#87CEEB";
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // ground
  ctx.fillStyle = "#2e8b57";
  ctx.fillRect(0, canvas.height/2, canvas.width, canvas.height/2);

  // road
  ctx.fillStyle = "#333";
  ctx.fillRect(canvas.width/2 - 100, canvas.height/2, 200, canvas.height/2);

  // buildings
  ctx.fillStyle = "#888";
  buildings.forEach(b => {
    let dz = b.z - car.z;
    if (dz > 1) {
      let p = project(b.x - car.x, dz);
      let size = 200 / dz;
      ctx.fillRect(p.x, p.y - size, size, size);
    }
  });

  // car (simple)
  ctx.fillStyle = "red";
  ctx.fillRect(canvas.width/2 - 10, canvas.height - 60, 20, 40);
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
