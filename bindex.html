<!DOCTYPE html>
<html>
<head>
  <title>3D Car Game</title>
  <style>
    body { margin: 0; overflow: hidden; }
  </style>
</head>
<body>

<!-- Three.js (non-module, works locally) -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r152/three.min.js"></script>

<script>
// Scene
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87CEEB);

// Camera
const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 1000);

// Renderer
const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// Light
const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(20, 40, 20);
scene.add(light);

// ===== GROUND =====
const ground = new THREE.Mesh(
  new THREE.PlaneGeometry(500, 500),
  new THREE.MeshLambertMaterial({ color: 0x3a9d23 })
);
ground.rotation.x = -Math.PI / 2;
scene.add(ground);

// ===== ROAD =====
const road = new THREE.Mesh(
  new THREE.PlaneGeometry(20, 500),
  new THREE.MeshLambertMaterial({ color: 0x333333 })
);
road.rotation.x = -Math.PI / 2;
road.position.y = 0.01;
scene.add(road);

// Road lines
for (let i = -200; i < 200; i += 20) {
  const line = new THREE.Mesh(
    new THREE.PlaneGeometry(1, 10),
    new THREE.MeshBasicMaterial({ color: 0xffffff })
  );
  line.rotation.x = -Math.PI / 2;
  line.position.set(0, 0.02, i);
  scene.add(line);
}

// ===== BUILDINGS =====
function createBuilding(x, z) {
  const height = Math.random() * 10 + 5;

  const building = new THREE.Mesh(
    new THREE.BoxGeometry(6, height, 6),
    new THREE.MeshLambertMaterial({ color: Math.random() * 0xffffff })
  );

  building.position.set(x, height / 2, z);
  scene.add(building);
}

// Generate city
for (let i = -100; i <= 100; i += 15) {
  for (let j = -100; j <= 100; j += 15) {
    if (Math.abs(i) > 12) {
      createBuilding(i, j);
    }
  }
}

// ===== CAR =====
const car = new THREE.Mesh(
  new THREE.BoxGeometry(2, 1, 4),
  new THREE.MeshLambertMaterial({ color: 0xff0000 })
);
car.position.y = 0.5;
scene.add(car);

// Controls
const keys = {};
addEventListener("keydown", e => keys[e.key.toLowerCase()] = true);
addEventListener("keyup", e => keys[e.key.toLowerCase()] = false);

let speed = 0;
let angle = 0;

// Game loop
function animate() {
  requestAnimationFrame(animate);

  // movement
  if (keys["w"]) speed += 0.01;
  if (keys["s"]) speed -= 0.01;
  speed *= 0.95;

  if (keys["a"]) angle += 0.03;
  if (keys["d"]) angle -= 0.03;

  car.rotation.y = angle;
  car.position.x += Math.sin(angle) * speed * 5;
  car.position.z += Math.cos(angle) * speed * 5;

  // camera
  camera.position.set(
    car.position.x - Math.sin(angle) * 10,
    6,
    car.position.z - Math.cos(angle) * 10
  );
  camera.lookAt(car.position);

  renderer.render(scene, camera);
}

animate();

// Resize
addEventListener("resize", () => {
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>

</body>
</html>
