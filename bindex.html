<!DOCTYPE html>
<html>
<head>
  <title>Big City Car Game</title>
  <style>
    body { margin:0; overflow:hidden; }

    #map {
      position:fixed;
      top:10px;
      right:10px;
      width:200px;
      height:200px;
      background:black;
      border:2px solid white;
    }
  </style>
</head>
<body>

<canvas id="map"></canvas>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>

<script>
// ===== SCENE =====
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);

// ===== CAMERA =====
const camera = new THREE.PerspectiveCamera(75, innerWidth/innerHeight, 0.1, 2000);

// ===== RENDERER =====
const renderer = new THREE.WebGLRenderer();
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// ===== LIGHT =====
const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(10,20,10);
scene.add(light);

// ===== GROUND =====
const ground = new THREE.Mesh(
  new THREE.BoxGeometry(5000,1,5000),
  new THREE.MeshLambertMaterial({color:0x339933})
);
ground.position.y = -3;
scene.add(ground);

// ===== CAR =====
const car = new THREE.Mesh(
  new THREE.BoxGeometry(1,1,2),
  new THREE.MeshLambertMaterial({color:0xff0000})
);
car.position.y = -2;
scene.add(car);

// ===== CONTROLS =====
let speed = 0;
let angle = 0;
let camDistance = 15;

const keys = {};
addEventListener("keydown", e=>keys[e.key.toLowerCase()]=true);
addEventListener("keyup", e=>keys[e.key.toLowerCase()]=false);

// zoom
addEventListener("wheel", e=>{
  camDistance += e.deltaY * 0.01;
  camDistance = Math.max(4, Math.min(30, camDistance));
});

// ===== CITY =====
const CITY_SIZE = 20;
const BLOCK_SIZE = 20;
const ROAD_WIDTH = 6;

const buildings = [];
const roads = [];

const roadMat = new THREE.MeshBasicMaterial({color:0x333333});
const bMat = new THREE.MeshLambertMaterial({color:0x888888});

for(let gx=-CITY_SIZE; gx<=CITY_SIZE; gx++){
  for(let gz=-CITY_SIZE; gz<=CITY_SIZE; gz++){

    const x = gx * BLOCK_SIZE;
    const z = gz * BLOCK_SIZE;

    if(gx % 3 === 0){
      const r = new THREE.Mesh(
        new THREE.BoxGeometry(ROAD_WIDTH,0.1,BLOCK_SIZE),
        roadMat
      );
      r.position.set(x,-2.5,z);
      scene.add(r);
      roads.push(r);
    }

    if(gz % 3 === 0){
      const r = new THREE.Mesh(
        new THREE.BoxGeometry(BLOCK_SIZE,0.1,ROAD_WIDTH),
        roadMat
      );
      r.position.set(x,-2.5,z);
      scene.add(r);
      roads.push(r);
    }

    if(gx % 3 !== 0 && gz % 3 !== 0){
      const h = Math.random()*6 + 2;

      const b = new THREE.Mesh(
        new THREE.BoxGeometry(4,h,4),
        bMat
      );

      b.position.set(x, h/2 - 2, z);
      scene.add(b);
      buildings.push(b);
    }
  }
}

// ===== TRAFFIC =====
const traffic = [];

for(let i=0;i<15;i++){
  const t = new THREE.Mesh(
    new THREE.BoxGeometry(1,1,2),
    new THREE.MeshLambertMaterial({color:0x0000ff})
  );

  t.position.set(
    (Math.floor(Math.random()*10)-5)*BLOCK_SIZE,
    -2,
    (Math.floor(Math.random()*10)-5)*BLOCK_SIZE
  );

  t.userData = {
    angle: Math.random()*Math.PI*2,
    speed: 0.05 + Math.random()*0.05
  };

  scene.add(t);
  traffic.push(t);
}

// ===== MINIMAP =====
const mapCanvas = document.getElementById("map");
const mapCtx = mapCanvas.getContext("2d");

function drawMap(){
  mapCtx.clearRect(0,0,200,200);

  const scale = 1;
  const offsetX = 100 - car.position.x * scale;
  const offsetY = 100 - car.position.z * scale;

  mapCtx.fillStyle = "gray";
  roads.forEach(r=>{
    mapCtx.fillRect(r.position.x*scale+offsetX-2, r.position.z*scale+offsetY-2, 4,4);
  });

  mapCtx.fillStyle = "white";
  buildings.forEach(b=>{
    mapCtx.fillRect(b.position.x*scale+offsetX-2, b.position.z*scale+offsetY-2, 4,4);
  });

  mapCtx.fillStyle = "blue";
  traffic.forEach(t=>{
    mapCtx.fillRect(t.position.x*scale+offsetX-2, t.position.z*scale+offsetY-2, 4,4);
  });

  mapCtx.fillStyle = "red";
  mapCtx.beginPath();
  mapCtx.arc(100,100,4,0,Math.PI*2);
  mapCtx.fill();
}

// ===== COLLISION =====
function checkCollision(newX,newZ){
  for(let b of buildings){
    if(Math.abs(newX - b.position.x) < 3 &&
       Math.abs(newZ - b.position.z) < 3){
      return true;
    }
  }
  return false;
}

// ===== LOOP =====
function animate(){

  // movement
  if(keys["w"]) speed += 0.02;
  if(keys["s"]) speed -= 0.02;
  speed *= 0.95;

  if(keys["a"]) angle += 0.03;
  if(keys["d"]) angle -= 0.03;

  let newX = car.position.x + Math.sin(angle) * speed * 2;
  let newZ = car.position.z + Math.cos(angle) * speed * 2;

  // collision
  if(!checkCollision(newX,newZ)){
    car.position.x = newX;
    car.position.z = newZ;
  } else {
    speed = 0;
  }

  car.rotation.y = -angle;

  // ===== TRAFFIC MOVE =====
  traffic.forEach(t=>{
    t.position.x += Math.sin(t.userData.angle) * t.userData.speed;
    t.position.z += Math.cos(t.userData.angle) * t.userData.speed;

    // random turns
    if(Math.random() < 0.01){
      t.userData.angle += (Math.random()-0.5);
    }
  });

  // camera
  camera.position.x = car.position.x - Math.sin(angle) * camDistance;
  camera.position.z = car.position.z - Math.cos(angle) * camDistance;
  camera.position.y = 5;
  camera.lookAt(car.position);

  drawMap();

  renderer.render(scene, camera);
  requestAnimationFrame(animate);
}

animate();

addEventListener("resize", ()=>{
  camera.aspect = innerWidth/innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>

</body>
</html>
